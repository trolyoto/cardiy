<!DOCTYPE html>
<html>
<head>
<title>Hồ sơ xe CARDIY</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:400px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
background:#0056b3;
color:white;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<h2>🚗 Hồ sơ xe</h2>

<div class="card">

<label>Biển số</label>
<input id="bienso">

<label>Hãng xe</label>
<input id="hangxe">

<label>Dòng xe</label>
<input id="dongxe">

<label>Size lốp</label>
<input id="lop">

<button onclick="luuxe()">Lưu hồ sơ xe</button>

</div>

<script>

function luuxe(){

let xe = {

bienso:document.getElementById("bienso").value,
hangxe:document.getElementById("hangxe").value,
dongxe:document.getElementById("dongxe").value,
lop:document.getElementById("lop").value

}

localStorage.setItem("xe",JSON.stringify(xe))

alert("Đã lưu hồ sơ xe")

}

</script>

</body>
</html>
